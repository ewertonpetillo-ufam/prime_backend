version: "3.9"

networks:
  frontend:
    external: true
  prime-network:
    external: true

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prime-backend
    restart: unless-stopped

    env_file:
      - .env
    environment:
      - NODE_OPTIONS=${NODE_OPTIONS:---max-old-space-size=2048}
      - UPLOAD_MAX_FILE_SIZE_BYTES=${UPLOAD_MAX_FILE_SIZE_BYTES:-314572800}
      # MinIO: no servidor, a API S3 costuma estar só em 127.0.0.1 no host — o backend no Docker
      # deve falar com o serviço pelo nome na rede "frontend" (ex.: http://minio:9000).
      # Se MINIO_ENDPOINT já existir no .env, esse valor NÃO sobrescreve (interpolação usa o .env).
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}

    # Porta exposta apenas no host (acesso via VPN)
    ports:
      - "4000:4000"

    labels:
      - "traefik.enable=true"

      # Router HTTPS - Swagger exposto publicamente
      # Prioridade MUITO ALTA (20) para garantir que seja processado antes do WordPress
      # Sem Authelia (já tem Basic Auth próprio)
      - "traefik.http.routers.backend-swagger-secure.rule=Host(`prime.icomp.ufam.edu.br`) && PathPrefix(`/api/docs`)"
      - "traefik.http.routers.backend-swagger-secure.entrypoints=websecure"
      - "traefik.http.routers.backend-swagger-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend-swagger-secure.priority=20"
      - "traefik.http.routers.backend-swagger-secure.service=backend-api"

      # Router HTTP - Swagger
      - "traefik.http.routers.backend-swagger-insecure.rule=Host(`prime.icomp.ufam.edu.br`) && PathPrefix(`/api/docs`)"
      - "traefik.http.routers.backend-swagger-insecure.entrypoints=web"
      - "traefik.http.routers.backend-swagger-insecure.priority=20"
      - "traefik.http.routers.backend-swagger-insecure.service=backend-api"

      # Router HTTPS - Endpoints da API (/api/v1/*)
      # Prioridade MUITO ALTA (20) para garantir que seja processado antes do WordPress
      - "traefik.http.routers.backend-api-secure.rule=Host(`prime.icomp.ufam.edu.br`) && PathPrefix(`/api/v1`)"
      - "traefik.http.routers.backend-api-secure.entrypoints=websecure"
      - "traefik.http.routers.backend-api-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend-api-secure.priority=20"
      - "traefik.http.routers.backend-api-secure.service=backend-api"

      # Router HTTP - Endpoints da API (/api/v1/*)
      - "traefik.http.routers.backend-api-insecure.rule=Host(`prime.icomp.ufam.edu.br`) && PathPrefix(`/api/v1`)"
      - "traefik.http.routers.backend-api-insecure.entrypoints=web"
      - "traefik.http.routers.backend-api-insecure.priority=20"
      - "traefik.http.routers.backend-api-insecure.service=backend-api"

      # Serviço - aponta para a porta do container
      - "traefik.http.services.backend-api.loadbalancer.server.port=4000"
      
      # Forçar detecção pelo Traefik (importante!)
      - "traefik.docker.network=frontend"

    # Redes internas para comunicação com outros containers
    networks:
      - frontend      # Para comunicação com Next.js frontend e Traefik
      - prime-network # Para comunicação com banco de dados

    healthcheck:
      # Healthcheck - verifica se a API está respondendo (401 é aceitável, significa que está funcionando)
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:4000/api/v1 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M