# DEPRECADO para backend-api — NÃO usar no serviço backend-api (Traefik v3 retorna 404 em /api/v1).
# Uploads grandes do webapp usam nextjs-upload-long@file — ver prime/deploy/traefik/dynamic/.
# Este arquivo permanece apenas como referência histórica; não copiar para produção no backend-api.
http:
  serversTransports:
    backend-upload-long:
      forwardingTimeouts:
        dialTimeout: 30s
        responseHeaderTimeout: 900s
        idleConnTimeout: 900s
